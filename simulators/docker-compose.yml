services:
  device_agent:
    image: spaneng/doover_device_agent:apps
    network_mode: host

  platform_iface:
    image: spaneng/doover_platform_iface
    network_mode: host
    entrypoint: python3 -u platform_iface.py --type=sim

  power-management:
    build: ../
    restart: unless-stopped
    network_mode: host
    depends_on:
      - device_agent
      - platform_iface
    environment:
      - APP_KEY=solar_power_management-1
      - CONFIG_FP=/app/simulators/app_config.json
    # Uncomment below for real hardware with Bluetooth access:
    # privileged: true
    # volumes:
    #   - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    #   - /etc/machine-id:/etc/machine-id:ro
    #   - /var/run/dbus:/var/run/dbus
    # cap_add:
    #   - NET_ADMIN
    #   - SYS_ADMIN
